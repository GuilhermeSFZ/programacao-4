<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grishaverse - Sangue e Sombras</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050511;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        h1 {
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            margin-bottom: 30px;
        }

        .galeria {
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        .livro {
            width: 150px;
            cursor: pointer;
            transition: transform 0.3s;
            border-radius: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .livro:hover { transform: scale(1.1); }

        .patronus-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px; 
            height: 800px; 
            pointer-events: none;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .luz-fundo {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            z-index: -1;
            border-radius: 50%;
        }

        .bicho-espiritual {
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0;
            z-index: 100;
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            mask-position: center;
        }

        /* Animação da Explosão de Cor ao fundo */
        @keyframes explosaoLuz {
            0% { transform: scale(0.4); opacity: 0; }
            15% { transform: scale(1.2); opacity: 0.9; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* Animação do Animal aparecendo */
        @keyframes animacaoPatrono {
            0% { transform: scale(0.6); opacity: 0; }
            15% { transform: scale(1); opacity: 1; }
            85% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.1); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>Grishaverse Saga</h1>

    <div class="galeria">
        <img src="img/capas - livros/Sombra&Ossos.jpg" class="livro" 
            onclick="invocarPatrono('img/amplificadores/cervo.png', '#ffecb3', 'detalhe', 'rgba(255, 149, 0, 0.8)')">

        <img src="img/capas - livros/Sol&Tormenta.jpg" class="livro" 
            onclick="invocarPatrono('img/amplificadores/cobra-marinha.png', '#00fff7', 'solido', 'rgba(0, 255, 247, 0.8)')">

        <img src="img/capas - livros/Ruina&Ascenção.jpg" class="livro" 
            onclick="invocarPatrono('img/amplificadores/fenix.png', '#ff4d4d', 'inversao', 'rgba(255, 89, 0, 0.8)')">
    </div>

    <div id="espaco-magico" class="patronus-container"></div>

    <script>
        function invocarPatrono(arquivo, corLuz, tipo, corExplosao) {
            const container = document.getElementById('espaco-magico');
            container.innerHTML = '';

            // 1. Criar Luz de Fundo (A explosão branca/colorida atrás)
            const luz = document.createElement('div');
            luz.className = 'luz-fundo';
            luz.style.background = `radial-gradient(circle, white 0%, ${corExplosao} 30%, rgba(255,255,255,0) 70%)`;
            luz.style.animation = "explosaoLuz 6s ease-out forwards";
            
            // 2. Criar o Animal
            const bicho = document.createElement('div');
            bicho.className = 'bicho-espiritual';
            
            if (tipo === 'detalhe') {
                // Cervo: Mantém linhas pretas e tinge de ouro
                bicho.style.backgroundImage = `url('${arquivo}')`;
                bicho.style.filter = `sepia(1) saturate(20) hue-rotate(10deg) brightness(1.2) drop-shadow(0 0 20px ${corLuz})`;
            } 
            else if (tipo === 'solido') {
                // Cobra: Cor sólida usando máscara
                bicho.style.webkitMaskImage = `url('${arquivo}')`;
                bicho.style.maskImage = `url('${arquivo}')`;
                bicho.style.backgroundColor = corLuz;
                bicho.style.filter = `drop-shadow(0 0 25px ${corLuz})`;
            }
            else {
                // Fênix: Inversão total para visual branco brilhante
                bicho.style.backgroundImage = `url('${arquivo}')`;
                bicho.style.filter = `invert(1) brightness(1.5) drop-shadow(0 0 20px ${corLuz})`;
            }

            bicho.style.animation = "animacaoPatrono 6s ease-in-out forwards";

            container.appendChild(luz);
            container.appendChild(bicho);

            setTimeout(() => { container.innerHTML = ''; }, 6500);
        }
    </script>
</body>
</html>
